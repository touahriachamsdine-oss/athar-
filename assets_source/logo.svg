<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
    <defs>
        <!-- Gradients for premium, vibrant Neo-Flat aesthetic -->
        <linearGradient id="pinkGradient" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#FF2A6D" />
            <stop offset="100%" stop-color="#A300FF" />
        </linearGradient>
        <linearGradient id="cyanGradient" x1="0%" y1="100%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#05D9E8" />
            <stop offset="100%" stop-color="#FFBE0B" />
        </linearGradient>
        <filter id="neoShadow" x="-20%" y="-20%" width="150%" height="150%">
            <feDropShadow dx="4" dy="4" stdDeviation="0" flood-color="#000000" flood-opacity="0.35" />
        </filter>
    </defs>
    
    <!-- Abstract premium geometric emblem: A styling of "A" & "أ" with upward dynamic motion -->
    <g filter="url(#neoShadow)">
        <!-- Left Pillar / Flame of Youth (Crimson Pink to Purple) -->
        <path d="M25 85 L45 25 L55 25 L35 85 Z" fill="url(#pinkGradient)" />
        
        <!-- Right Pillar / Scientific Ray (Cyber Cyan to Solar Amber) -->
        <path d="M75 85 L55 25 L45 25 L65 85 Z" fill="url(#cyanGradient)" opacity="0.9" />
        
        <!-- Center Intersecting Star / Prevention Shield -->
        <polygon points="50,15 54,32 70,32 57,42 62,58 50,48 38,58 43,42 30,32 46,32" fill="#FFFFFF" />
        
        <!-- Dynamic Base Wave (Empowerment / Community) -->
        <path d="M20 75 Q50 60 80 75 L80 85 Q50 70 20 85 Z" fill="#05D9E8" opacity="0.8" />
    </g>
</svg>
