<!DOCTYPE html>
<html lang="ar" dir="rtl" data-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مهامي — أثر</title>
    <link rel="stylesheet" href="../src/css/reset.css">
    <link rel="stylesheet" href="../src/css/variables.css">
    <link rel="stylesheet" href="../src/css/typography.css">
    <link rel="stylesheet" href="../src/css/glass.css">
    <link rel="stylesheet" href="../src/css/components.css">
    <link rel="stylesheet" href="../src/css/animations.css">
    <link rel="stylesheet" href="../src/css/layout.css">
    <link rel="stylesheet" href="../src/css/utilities.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;800&family=Outfit:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Cairo', 'Outfit', sans-serif; }
        .task-card {
            display: flex; align-items: center; justify-content: space-between;
            padding: 22px 28px; border-radius: 22px;
            background: rgba(255,255,255,0.02);
            transition: var(--transition); gap: 20px; flex-wrap: wrap;
        }
        .task-card:hover { background: rgba(255,255,255,0.04); transform: translateX(-4px); }
        .status-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
        .empty-state { text-align: center; padding: 80px 20px; opacity: 0.45; }
        .empty-state div { font-size: 64px; margin-bottom: 20px; }
        .progress-ring {
            width: 52px; height: 52px; border-radius: 50%;
            background: conic-gradient(var(--accent-cyan) 0%, rgba(255,255,255,0.05) 0%);
            display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 800;
            font-family: var(--mono); flex-shrink: 0;
        }
    </style>
</head>

<body class="dashboard-grid">
    <aside class="sidebar glass" style="margin:20px; border-radius:30px;"></aside>

    <main class="container" style="padding:40px; max-width:1100px; width:100%; box-sizing:border-box;">
        <header style="display:flex; justify-content:space-between; align-items:center; margin-bottom:40px; flex-wrap:wrap; gap:20px;">
            <div>
                <h1 class="gradient-text syne" style="font-size:34px; font-weight:800;" id="page-title">مهامي اليومية</h1>
                <p style="opacity:0.5; margin-top:6px; font-size:14px;" id="page-subtitle">المهام والتحديات المسندة إليك من المبادرات</p>
            </div>
            <div class="glass" style="padding:14px 24px; border-radius:18px; text-align:center; min-width:120px;">
                <div class="mono" style="font-size:10px; opacity:0.45;">COMPLETED</div>
                <div class="syne" style="font-size:24px; font-weight:800; color:var(--accent-cyan);" id="progress-label">0 / 0</div>
            </div>
        </header>

        <!-- Summary bar -->
        <div style="height:6px; background:rgba(255,255,255,0.05); border-radius:6px; margin-bottom:35px; overflow:hidden;">
            <div id="progress-bar" style="height:100%; border-radius:6px; background:linear-gradient(90deg, var(--accent-cyan), var(--accent-pink)); transition:width 1s ease; width:0%;"></div>
        </div>

        <div id="task-list" style="display:flex; flex-direction:column; gap:15px;"></div>
    </main>

    <script type="module">
        import { requireAuth } from '../src/js/auth.js';
        import { neon } from '../src/js/neon.js';
        import { injectLayout } from '../src/js/layout.js';
        import { getCurrentLang } from '../src/js/i18n.js';
        import { showToast } from '../src/js/utils.js';

        const DICT = {
            ar: { page: 'مهامي اليومية', subtitle: 'المهام والتحديات المسندة إليك', empty: 'لا توجد مهام مسندة إليك حالياً 🎉', completed: 'مكتمل', pending: 'قيد التنفيذ', mark_done: 'تحديد كمكتمل', done_msg: '✅ تم تحديد المهمة كمكتملة!' },
            fr: { page: 'Mes Tâches', subtitle: 'Tâches et défis qui vous sont assignés', empty: 'Aucune tâche assignée pour l\'instant 🎉', completed: 'Complété', pending: 'En cours', mark_done: 'Marquer terminé', done_msg: '✅ Tâche marquée comme terminée !' },
            en: { page: 'My Tasks', subtitle: 'Tasks and challenges assigned to you', empty: 'No tasks assigned to you right now 🎉', completed: 'Completed', pending: 'In Progress', mark_done: 'Mark Done', done_msg: '✅ Task marked as complete!' }
        };

        async function init() {
            const auth = await requireAuth();
            if (!auth) return;
            injectLayout();

            const lang = getCurrentLang();
            const t = DICT[lang] || DICT.ar;
            document.getElementById('page-title').textContent = t.page;
            document.getElementById('page-subtitle').textContent = t.subtitle;

            const { data } = await neon.from('tasks').select('*, initiatives(title_ar, title_fr, title_en)').eq('assigned_to', auth.user.id);
            const tasks = data || [];
            const list = document.getElementById('task-list');

            if (!tasks.length) {
                list.innerHTML = `<div class="empty-state"><div>✅</div><p>${t.empty}</p></div>`;
                document.getElementById('progress-label').textContent = '0 / 0';
                return;
            }

            const done = tasks.filter(t => t.status === 'completed').length;
            document.getElementById('progress-label').textContent = `${done} / ${tasks.length}`;
            document.getElementById('progress-bar').style.width = `${(done / tasks.length) * 100}%`;

            const titleKey = lang === 'fr' ? 'title_fr' : (lang === 'en' ? 'title_en' : 'title_ar');

            list.innerHTML = tasks.map(task => {
                const isDone = task.status === 'completed';
                const initiative = task.initiatives?.[titleKey] || task.initiatives?.title_ar || '';
                return `
                <div class="task-card glass" id="task-${task.id}">
                    <div style="display:flex; align-items:center; gap:16px; flex:1;">
                        <div class="status-dot" style="background:${isDone ? 'var(--accent-cyan)' : 'rgba(255,255,255,0.2)'};
                            box-shadow:${isDone ? '0 0 8px rgba(5,217,232,0.5)' : 'none'};"></div>
                        <div>
                            ${initiative ? `<div class="mono" style="font-size:10px; color:var(--accent-cyan); margin-bottom:4px;">${initiative}</div>` : ''}
                            <div style="font-size:16px; font-weight:700; ${isDone ? 'opacity:0.4; text-decoration:line-through;' : ''}">${task.title_ar || task.title || '—'}</div>
                        </div>
                    </div>
                    <div style="display:flex; align-items:center; gap:14px;">
                        <div class="badge" style="background:${isDone ? 'rgba(5,217,232,0.1)' : 'rgba(255,255,255,0.05)'}; color:${isDone ? 'var(--accent-cyan)' : 'var(--text-dim)'};">
                            ${isDone ? t.completed : t.pending}
                        </div>
                        ${!isDone ? `<button class="btn btn-outline mark-done-btn" data-id="${task.id}" style="padding:8px 16px; font-size:12px; border-radius:10px;">${t.mark_done}</button>` : ''}
                    </div>
                </div>`;
            }).join('');

            list.addEventListener('click', async e => {
                const btn = e.target.closest('.mark-done-btn');
                if (!btn) return;
                btn.disabled = true; btn.textContent = '⏳';
                await neon.from('tasks').update({ status: 'completed' }).eq('id', btn.dataset.id);
                showToast(t.done_msg, 'success');
                setTimeout(() => init(), 500);
            });
        }
        init();
    </script>
</body>

</html>
