<!DOCTYPE html>
<html lang="ar" dir="rtl" data-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>انضم — أثر</title>
    <link rel="stylesheet" href="../src/css/reset.css">
    <link rel="stylesheet" href="../src/css/variables.css">
    <link rel="stylesheet" href="../src/css/typography.css">
    <link rel="stylesheet" href="../src/css/glass.css">
    <link rel="stylesheet" href="../src/css/components.css">
    <link rel="stylesheet" href="../src/css/animations.css">
    <link rel="stylesheet" href="../src/css/layout.css">
    <link rel="stylesheet" href="../src/css/utilities.css">
</head>

<body class="flex-center" style="min-height: 100vh; padding: 20px;">
    <div id="living-canvas" style="position:fixed; inset:0; z-index:-1;"></div>

    <div class="glass" style="padding:40px; width:100%; max-width:450px; border-radius: 30px;">
        <div class="text-center mb-40">
            <div style="display:flex; align-items:center; justify-content:center; gap:12px; margin-bottom:15px;">
                <img src="../public/logo.png" alt="Athar Logo" style="width:50px; height:50px; filter: drop-shadow(0 0 10px rgba(255, 42, 109, 0.4));">
            </div>
            <div class="logo syne gradient-text" style="font-size: 32px; font-weight:800; letter-spacing:-1px;">ATHAR — أثر</div>
            <p id="mode-text" style="opacity:0.65; margin-top:5px;">دخول إلى حسابك</p>
        </div>

        <form id="auth-form" style="display:flex; flex-direction:column; gap:15px;">
            <!-- Signup Only Fields -->
            <div id="signup-fields" style="display:none; flex-direction:column; gap:15px;">
                <input type="text" id="full_name" placeholder="الاسم الكامل" class="input-field">
                <input type="tel" id="phone" placeholder="رقم الهاتف" class="input-field">
                <select id="wilaya" class="input-field" style="height:60px;">
                    <option value="" disabled selected>اختر الولاية</option>
                </select>
                <input type="text" id="neighborhood" placeholder="الحي" class="input-field">
            </div>

            <!-- Common Fields -->
            <input type="email" id="email" placeholder="البريد الإلكتروني" class="input-field" required>
            <input type="password" id="password" placeholder="كلمة المرور" class="input-field" required>

            <button type="submit" id="submit-btn" class="btn btn-primary mt-20" style="width:100%; justify-content:center;">دخول</button>

            <div style="display:flex; align-items:center; margin: 15px 0;">
                <div style="flex:1; height:1px; background: rgba(255,255,255,0.1);"></div>
                <div style="padding: 0 10px; font-size:12px; opacity:0.5;">أو / Ou</div>
                <div style="flex:1; height:1px; background: rgba(255,255,255,0.1);"></div>
            </div>

            <button type="button" id="demo-btn" class="btn btn-secondary" style="width:100%; justify-content:center; background: linear-gradient(135deg, rgba(255, 42, 109, 0.15), rgba(5, 217, 244, 0.15)); border: 1px solid rgba(255, 42, 109, 0.3); box-shadow: 0 8px 32px rgba(255, 42, 109, 0.1);">
                ✨ دخول سريع (نسخة تجريبية)
            </button>
        </form>

        <div class="text-center mt-30">
            <button id="toggle-mode"
                style="background:none; border:none; color:var(--accent-pink); cursor:pointer; font-size:14px; opacity:0.8; font-weight:600;">
                ليس لديك حساب؟ إنشاء حساب جديد
            </button>
        </div>
    </div>

    <script type="module">
        import { signIn, signUp, signInDemo } from '../src/js/auth.js';
        import { injectLayout } from '../src/js/layout.js';
        import { APP_CONFIG } from '../src/js/config.js';

        let isLogin = true;
        injectLayout();

        // Populate Wilayas
        const wilayaSelect = document.getElementById('wilaya');
        APP_CONFIG.wilayas.forEach((w, i) => {
            const opt = document.createElement('option');
            opt.value = w;
            opt.textContent = `${i + 1}. ${w}`;
            wilayaSelect.appendChild(opt);
        });

        const toggleBtn = document.getElementById('toggle-mode');
        const signupFields = document.getElementById('signup-fields');
        const submitBtn = document.getElementById('submit-btn');
        const demoBtn = document.getElementById('demo-btn');
        const modeText = document.getElementById('mode-text');

        toggleBtn.onclick = () => {
            isLogin = !isLogin;
            signupFields.style.display = isLogin ? 'none' : 'flex';
            submitBtn.textContent = isLogin ? 'دخول' : 'إنشاء حساب جديد';
            modeText.textContent = isLogin ? 'دخول إلى حسابك' : 'أنشئ حسابك للمشاركة';
            toggleBtn.textContent = isLogin ? 'ليس لديك حساب؟ إنشاء حساب جديد' : 'لديك حساب بالفعل؟ سجل دخولك';
            demoBtn.style.display = isLogin ? 'flex' : 'none';
        };

        demoBtn.onclick = async () => {
            demoBtn.disabled = true;
            demoBtn.style.opacity = 0.5;
            await signInDemo('superadmin');
        };

        document.getElementById('auth-form').onsubmit = async (e) => {
            e.preventDefault();
            submitBtn.disabled = true;
            submitBtn.style.opacity = 0.5;

            const email = document.getElementById('email').value;
            const pass = document.getElementById('password').value;

            if (isLogin) {
                const res = await signIn(email, pass);
                if (res?.error) alert(res.error);
            } else {
                const fullName = document.getElementById('full_name').value;
                const phone = document.getElementById('phone').value;
                const wilaya = document.getElementById('wilaya').value;
                const neighborhood = document.getElementById('neighborhood').value;

                const res = await signUp(email, pass, fullName, phone, wilaya, neighborhood);
                if (res?.error) alert(res.error);
            }
            submitBtn.disabled = false;
            submitBtn.style.opacity = 1;
        };
    </script>
</body>

</html>
